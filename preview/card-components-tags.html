<!doctype html><html><head><meta charset="utf-8"><link href="https://fonts.googleapis.com/css2?family=Inter:wght@600;700&family=Noto+Sans+TC:wght@600&display=swap" rel="stylesheet"><style>
  html,body{margin:0;background:#0D0D0D;color:#F5F5F5;font-family:'Inter','Noto Sans TC',system-ui,sans-serif}
  .wrap{padding:22px 30px;display:flex;flex-direction:column;gap:14px}
  .row{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
  .skill{padding:.4rem 1rem;border-radius:999px;font-size:.8rem;font-weight:600;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1)}
  .skill.h{background:rgba(255,77,109,.15);border-color:#FF4D6D;transform:translateY(-2px)}
  .chip{font-size:.7rem;font-weight:700;padding:.2rem .6rem;border-radius:4px;text-transform:uppercase;letter-spacing:.5px}
  .lbl{font-family:ui-monospace,Menlo,monospace;font-size:10px;color:#888}
</style></head><body>
<div class="wrap">
  <div class="row">
    <span class="skill">UI Design</span>
    <span class="skill">UX Research</span>
    <span class="skill">Figma</span>
    <span class="skill h">Brand Identity</span>
    <span class="skill">Motion Design</span>
  </div>
  <div class="lbl">Skill tag — pill, white-07 fill, hover → c1 border + c1@15 fill</div>
  <div class="row">
    <span class="chip" style="background:rgba(255,77,109,.133);color:#FF4D6D">UI/UX</span>
    <span class="chip" style="background:rgba(255,190,11,.133);color:#FFBE0B">Mobile</span>
    <span class="chip" style="background:rgba(58,134,255,.133);color:#3A86FF">Dashboard</span>
    <span class="chip" style="background:rgba(6,214,160,.133);color:#06D6A0">Data Viz</span>
    <span class="chip" style="background:rgba(131,56,236,.133);color:#8338EC">Brand</span>
  </div>
  <div class="lbl">Work chip — 4px radius, accent@13 bg, accent text, UPPERCASE</div>
</div>
</body></html>
