<!doctype html><html><head><meta charset="utf-8"><style>
  html,body{margin:0;background:#0D0D0D;color:#F5F5F5;font-family:'Inter',system-ui,sans-serif}
  .wrap{padding:22px 30px;display:flex;align-items:center;gap:26px}
  .col{display:flex;flex-direction:column;gap:14px}
  .bar{display:flex;align-items:center;gap:10px}
  .swatch{width:52px;height:52px;background:#FF4D6D;border-radius:16px}
  .pill{height:34px;padding:0 18px;background:linear-gradient(135deg,#FF4D6D,#8338EC);border-radius:999px;display:flex;align-items:center;font-weight:700;font-size:13px}
  .chip{height:20px;background:rgba(255,77,109,.133);color:#FF4D6D;border-radius:4px;padding:0 8px;display:inline-flex;align-items:center;font-size:10px;font-weight:700;letter-spacing:.5px;text-transform:uppercase}
  .lbl{font-family:ui-monospace,Menlo,monospace;font-size:10px;color:#888}
</style></head><body>
<div class="wrap">
  <div class="col">
    <div class="bar"><div class="swatch" style="border-radius:16px"></div><span class="lbl">16px · cards, images</span></div>
    <div class="bar"><div class="swatch" style="border-radius:8px;width:52px;height:30px"></div><span class="lbl">8px · highlight corner</span></div>
    <div class="bar"><div class="chip">UI/UX</div><span class="lbl">4px · work chips</span></div>
  </div>
  <div class="col">
    <div class="pill">查看作品 →</div>
    <span class="lbl">999px · buttons, tags, social</span>
  </div>
</div>
</body></html>
