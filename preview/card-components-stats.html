<!doctype html><html><head><meta charset="utf-8"><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Noto+Sans+TC:wght@400;900&display=swap" rel="stylesheet"><style>
  html,body{margin:0;background:#0D0D0D;color:#F5F5F5;font-family:'Inter','Noto Sans TC',system-ui,sans-serif}
  .wrap{padding:20px;display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
  .stat{background:#161616;padding:18px 16px;border-radius:16px;border:1px solid rgba(255,255,255,.06)}
  .num{font-size:2.2rem;font-weight:900;background:linear-gradient(135deg,#FF4D6D,#FFBE0B);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:.3rem;line-height:1}
  .lbl{font-size:.72rem;color:#888;text-transform:uppercase;letter-spacing:.5px}
</style></head><body>
<div class="wrap">
  <div class="stat"><div class="num">38%</div><div class="lbl">結帳完成率提升</div></div>
  <div class="stat"><div class="num">52%</div><div class="lbl">購物車遺棄率下降</div></div>
  <div class="stat"><div class="num">2.3步</div><div class="lbl">平均結帳步數</div></div>
  <div class="stat"><div class="num">4.8/5</div><div class="lbl">用戶滿意度</div></div>
</div>
</body></html>
