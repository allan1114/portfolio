<!doctype html><html><head><meta charset="utf-8"><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Noto+Sans+TC:wght@400;700&display=swap" rel="stylesheet"><style>
  html,body{margin:0;background:#0D0D0D;color:#F5F5F5;font-family:'Inter','Noto Sans TC',system-ui,sans-serif}
  .wrap{padding:22px 30px;display:flex;flex-direction:column;gap:16px}
  .hl{background:rgba(255,77,109,.08);border-left:4px solid #FF4D6D;padding:1.1rem 1.4rem;border-radius:0 16px 16px 0}
  .hl h4{margin:0 0 .35rem;font-size:.78rem;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:#FF4D6D}
  .hl p{margin:0;color:#888;line-height:1.65;font-size:.85rem}
  .ins{background:rgba(255,255,255,.04);border-left:3px solid #FFBE0B;padding:.7rem 1rem;border-radius:0 8px 8px 0}
  .ins strong{color:#FFBE0B;display:block;margin-bottom:.25rem;font-size:.7rem;text-transform:uppercase;letter-spacing:1px;font-weight:700}
  .ins span{color:#888;font-size:.78rem;line-height:1.55}
</style></head><body>
<div class="wrap">
  <div class="hl"><h4>核心問題</h4><p>結帳流程超過 7 步，用戶感到疲勞。購物車遺棄率達 65%，遠高於行業平均。</p></div>
  <div class="ins"><strong>💡 設計思路</strong><span>通過簡化步驟、加強信任感元素，最終將完成率提升 38%。</span></div>
</div>
</body></html>
