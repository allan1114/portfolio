<!doctype html><html><head><meta charset="utf-8"><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet"><style>
  html,body{margin:0;background:#0D0D0D;color:#F5F5F5;font-family:'Inter',system-ui,sans-serif}
  .wrap{padding:22px 30px;display:flex;flex-direction:column;gap:18px}
  .row{display:flex;align-items:center;gap:20px}
  .tok{width:150px;font-family:ui-monospace,Menlo,monospace;font-size:10px;color:#888}
  .chip{display:inline-flex;align-items:center;padding:.35rem 1rem;background:rgba(255,77,109,.15);border:1px solid rgba(255,77,109,.3);border-radius:999px;font-size:12.8px;color:#FF4D6D;letter-spacing:1px;text-transform:uppercase;font-weight:600}
  .eyebrow{font-size:12px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:#FF4D6D}
  .meta{font-size:12.8px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:#888}
  .worktag{font-size:11.2px;font-weight:700;padding:.2rem .6rem;border-radius:4px;text-transform:uppercase;letter-spacing:.5px;background:rgba(255,77,109,.133);color:#FF4D6D}
</style></head><body>
<div class="wrap">
  <div class="row"><div class="tok">Section eyebrow</div><div class="eyebrow">Selected Works</div></div>
  <div class="row"><div class="tok">Hero pill tag</div><div class="chip">✦ Available for work</div></div>
  <div class="row"><div class="tok">Meta label</div><div class="meta">Client</div></div>
  <div class="row"><div class="tok">Work chip</div><div class="worktag">UI/UX</div></div>
</div>
</body></html>
