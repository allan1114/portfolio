<!doctype html><html><head><meta charset="utf-8"><style>
  html,body{margin:0;background:#0D0D0D;color:#F5F5F5;font-family:'Inter',system-ui,sans-serif}
  .wrap{padding:18px 22px;display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:14px}
  .sw{border-radius:12px;aspect-ratio:16/9;padding:12px;display:flex;flex-direction:column;justify-content:space-between;position:relative;overflow:hidden}
  .sw .name{font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase}
  .sw .tok{font-size:10px;font-family:ui-monospace,Menlo,monospace;opacity:.55;margin-top:2px}
  .sw .hex{font-size:11px;font-family:ui-monospace,Menlo,monospace;opacity:.9}
</style></head><body>
<div class="wrap">
  <div class="sw" style="background:#0D0D0D;border:1px solid rgba(255,255,255,.1);color:#F5F5F5">
    <div><div class="name">Background</div><div class="tok">--bg</div></div><div class="hex">#0D0D0D</div>
  </div>
  <div class="sw" style="background:#161616;border:1px solid rgba(255,255,255,.1);color:#F5F5F5">
    <div><div class="name">Surface</div><div class="tok">--bg2</div></div><div class="hex">#161616</div>
  </div>
  <div class="sw" style="background:#F5F5F5;color:#111">
    <div><div class="name">Text</div><div class="tok">--text</div></div><div class="hex">#F5F5F5</div>
  </div>
  <div class="sw" style="background:#888;color:#fff">
    <div><div class="name">Muted</div><div class="tok">--text-muted</div></div><div class="hex">#888888</div></div>
</div>
</body></html>
