<!doctype html><html><head><meta charset="utf-8"><style>
  html,body{margin:0;background:#0D0D0D;color:#F5F5F5;font-family:'Inter',system-ui,sans-serif}
  .wrap{padding:22px 30px;display:flex;flex-direction:column;gap:8px}
  .row{display:flex;align-items:center;gap:12px}
  .bar{background:#FF4D6D;height:22px;border-radius:4px}
  .tok{width:76px;font-family:ui-monospace,Menlo,monospace;font-size:10px;color:#888}
  .px{font-family:ui-monospace,Menlo,monospace;font-size:10px;color:#bbb}
</style></head><body>
<div class="wrap">
  <div class="row"><span class="tok">--space-2</span><div class="bar" style="width:8px"></div><span class="px">8px</span></div>
  <div class="row"><span class="tok">--space-4</span><div class="bar" style="width:16px"></div><span class="px">16px · body gap</span></div>
  <div class="row"><span class="tok">--space-5</span><div class="bar" style="width:24px"></div><span class="px">24px · card gap</span></div>
  <div class="row"><span class="tok">--space-6</span><div class="bar" style="width:32px"></div><span class="px">32px</span></div>
  <div class="row"><span class="tok">--space-10</span><div class="bar" style="width:48px"></div><span class="px">48px · section pad-x</span></div>
  <div class="row"><span class="tok">--space-16</span><div class="bar" style="width:96px"></div><span class="px">96px · section pad-y</span></div>
  <div class="row"><span class="tok">--space-20</span><div class="bar" style="width:128px"></div><span class="px">128px · hero top</span></div>
</div>
</body></html>
