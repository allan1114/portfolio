<!doctype html><html><head><meta charset="utf-8"><style>
  html,body{margin:0;background:#0D0D0D;color:#F5F5F5;font-family:'Inter',system-ui,sans-serif}
  .wrap{padding:20px 28px;display:flex;gap:20px;align-items:center}
  .cursor{position:relative;width:140px;height:140px;flex-shrink:0}
  .dot{position:absolute;width:14px;height:14px;background:#FF4D6D;border-radius:50%;top:56px;left:58px}
  .ring{position:absolute;width:44px;height:44px;border:2px solid rgba(255,77,109,.5);border-radius:50%;top:41px;left:43px;animation:pulse 2s ease-in-out infinite}
  .ring.active{width:68px;height:68px;top:29px;left:31px;border-color:rgba(255,77,109,.9)}
  @keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.04)}}
  .spec{font-family:ui-monospace,Menlo,monospace;font-size:11px;color:#888;line-height:1.8}
  .spec b{color:#ccc}
</style></head><body>
<div class="wrap">
  <div class="cursor"><div class="ring"></div><div class="dot"></div></div>
  <div class="cursor" style="width:120px"><div class="ring active"></div><div class="dot" style="transform:scale(2);top:53px;left:55px"></div></div>
  <div class="spec"><b>Rest</b> — 12px dot · 36px ring @ c1@50 border<br><b>Hover</b> — dot scale 2x · ring 60px · border c1@80<br><b>Easing</b> — rx += (mx − rx) · 0.12 per frame<br><b>Mobile</b> — disabled (cursor:auto)</div>
</div>
</body></html>
