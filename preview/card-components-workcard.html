<!doctype html><html><head><meta charset="utf-8"><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&family=Noto+Sans+TC:wght@400;700;800&display=swap" rel="stylesheet"><style>
  html,body{margin:0;background:#0D0D0D;color:#F5F5F5;font-family:'Inter','Noto Sans TC',system-ui,sans-serif}
  .wrap{padding:20px;display:grid;grid-template-columns:1fr 1fr;gap:16px}
  .card{background:#161616;border:1px solid rgba(255,255,255,.06);border-radius:16px;overflow:hidden}
  .card.h{transform:translateY(-8px);box-shadow:0 20px 60px rgba(0,0,0,.5)}
  .thumb{aspect-ratio:16/10;display:flex;align-items:center;justify-content:center;font-size:40px;position:relative;overflow:hidden}
  .thumb::after{content:'';position:absolute;inset:0;background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .3s;color:#fff;font-size:12px;font-weight:600;letter-spacing:1px;content:'✦ 查看詳情'}
  .card.h .thumb::after{opacity:1}
  .body{padding:14px}
  .chip{font-size:.65rem;font-weight:700;padding:.18rem .5rem;border-radius:4px;text-transform:uppercase;letter-spacing:.5px;margin-right:4px;background:rgba(255,77,109,.133);color:#FF4D6D}
  .title{font-size:1rem;font-weight:800;margin:.4rem 0 .3rem}
  .desc{font-size:.75rem;color:#888;line-height:1.55}
</style></head><body>
<div class="wrap">
  <div class="card">
    <div class="thumb" style="background:linear-gradient(135deg,rgba(255,77,109,.133),rgba(255,190,11,.133))">🛍️</div>
    <div class="body"><span class="chip">UI/UX</span><span class="chip" style="background:rgba(255,190,11,.133);color:#FFBE0B">Mobile</span><div class="title">電商 App 購物體驗</div><div class="desc">為某品牌重新設計購物流程</div></div>
  </div>
  <div class="card h">
    <div class="thumb" style="background:linear-gradient(135deg,rgba(131,56,236,.133),rgba(58,134,255,.133))">🎨</div>
    <div class="body"><span class="chip" style="background:rgba(131,56,236,.133);color:#8338EC">Brand</span><span class="chip" style="background:rgba(58,134,255,.133);color:#3A86FF">Identity</span><div class="title">新創品牌視覺識別</div><div class="desc">從零建立完整品牌語言</div></div>
  </div>
</div>
</body></html>
