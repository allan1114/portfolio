<!doctype html><html><head><meta charset="utf-8"><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Noto+Sans+TC:wght@400;700;900&display=swap" rel="stylesheet"><style>
  html,body{margin:0;background:#0D0D0D;color:#F5F5F5;font-family:'Inter','Noto Sans TC',system-ui,sans-serif}
  .wrap{padding:26px 30px}
  .title{font-size:72px;font-weight:900;letter-spacing:-2px;line-height:1.05;margin:0}
  .grad{background:linear-gradient(135deg,#FF4D6D 0%,#FFBE0B 50%,#3A86FF 100%);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;background-size:200% 200%;animation:g 4s ease infinite}
  @keyframes g{0%,100%{background-position:0% 50%}50%{background-position:100% 50%}}
  .spec{margin-top:14px;display:flex;gap:20px;font-size:11px;font-family:ui-monospace,Menlo,monospace;color:#888;letter-spacing:.3px}
  .spec b{color:#ccc;font-weight:600}
</style></head><body>
<div class="wrap">
  <h1 class="title">Your Name<br><span class="grad">Designer.</span></h1>
  <div class="spec"><span><b>weight</b> 900</span><span><b>tracking</b> −2px</span><span><b>leading</b> 1.05</span><span><b>clamp</b> 48→112px</span></div>
</div>
</body></html>
