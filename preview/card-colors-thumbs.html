<!doctype html><html><head><meta charset="utf-8"><style>
  html,body{margin:0;background:#0D0D0D;color:#F5F5F5;font-family:'Inter',system-ui,sans-serif}
  .wrap{padding:22px;display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
  .box{aspect-ratio:16/10;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:40px;position:relative;overflow:hidden}
  .box::after{content:'';position:absolute;inset:0;background:repeating-linear-gradient(45deg,rgba(255,255,255,.03) 0 1px,transparent 1px 10px)}
  .lbl{font-size:10px;font-family:ui-monospace,Menlo,monospace;opacity:.7;margin-top:6px;text-align:center}
</style></head><body>
<div class="wrap">
  <div>
    <div class="box" style="background:linear-gradient(135deg,rgba(255,77,109,.133),rgba(255,190,11,.133))">🛍️</div>
    <div class="lbl">c1-tint → c2-tint</div>
  </div>
  <div>
    <div class="box" style="background:linear-gradient(135deg,rgba(131,56,236,.133),rgba(58,134,255,.133))">🎨</div>
    <div class="lbl">c4-tint → c3-tint</div>
  </div>
  <div>
    <div class="box" style="background:linear-gradient(135deg,rgba(58,134,255,.133),rgba(6,214,160,.133))">📊</div>
    <div class="lbl">c3-tint → c5-tint</div>
  </div>
  <div>
    <div class="box" style="background:linear-gradient(135deg,rgba(255,190,11,.133),rgba(255,77,109,.133))">🌐</div>
    <div class="lbl">c2-tint → c1-tint</div>
  </div>
</div>
</body></html>
