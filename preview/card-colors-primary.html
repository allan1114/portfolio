<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
  html,body{margin:0;background:#0D0D0D;color:#F5F5F5;font-family:'Inter','Noto Sans TC',system-ui,sans-serif}
  .wrap{padding:18px 22px;display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
  .sw{border-radius:12px;aspect-ratio:16/9;padding:12px;display:flex;flex-direction:column;justify-content:space-between;position:relative;overflow:hidden;border:1px solid rgba(255,255,255,.06)}
  .sw .name{font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;opacity:.95;display:flex;justify-content:space-between;align-items:center}
  .sw .hex{font-size:11px;font-family:ui-monospace,Menlo,monospace;opacity:.9}
  .sw .tok{font-size:10px;font-family:ui-monospace,Menlo,monospace;opacity:.55}
</style></head><body>
<div class="wrap">
  <div class="sw" style="background:#FF4D6D"><div class="name"><span>Vibrant Red</span><span class="tok">--c1</span></div><div class="hex">#FF4D6D</div></div>
  <div class="sw" style="background:#FFBE0B;color:#111"><div class="name"><span>Bold Yellow</span><span class="tok">--c2</span></div><div class="hex">#FFBE0B</div></div>
  <div class="sw" style="background:#3A86FF"><div class="name"><span>Bright Blue</span><span class="tok">--c3</span></div><div class="hex">#3A86FF</div></div>
  <div class="sw" style="background:#8338EC"><div class="name"><span>Deep Purple</span><span class="tok">--c4</span></div><div class="hex">#8338EC</div></div>
</div>
</body></html>
