<!doctype html><html><head><meta charset="utf-8"><style>
  html,body{margin:0;background:#0D0D0D;color:#F5F5F5;font-family:'Inter',system-ui,sans-serif}
  .wrap{padding:22px;display:flex;flex-direction:column;gap:12px}
  .row{display:flex;align-items:center;gap:16px}
  .bar{height:54px;border-radius:10px;flex:1;display:flex;align-items:center;padding:0 16px;font-weight:800;font-size:13px;letter-spacing:.5px}
  .tok{width:220px;font-family:ui-monospace,Menlo,monospace;font-size:11px;color:#888}
</style></head><body>
<div class="wrap">
  <div class="row">
    <div class="tok">--grad-logo</div>
    <div class="bar" style="background:linear-gradient(135deg,#FF4D6D,#FFBE0B);color:#1a0808">YN.  →  red · yellow</div>
  </div>
  <div class="row">
    <div class="tok">--grad-primary</div>
    <div class="bar" style="background:linear-gradient(135deg,#FF4D6D,#8338EC)">Primary CTA  →  red · purple</div>
  </div>
  <div class="row">
    <div class="tok">--grad-hero</div>
    <div class="bar" style="background:linear-gradient(135deg,#FF4D6D 0%,#FFBE0B 50%,#3A86FF 100%)">Hero title  →  red · yellow · blue</div>
  </div>
  <div class="row">
    <div class="tok">--grad-about</div>
    <div class="bar" style="background:linear-gradient(135deg,#8338EC,#FF4D6D)">About placeholder  →  purple · red</div>
  </div>
</div>
</body></html>
