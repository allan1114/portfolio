<!doctype html><html><head><meta charset="utf-8"><link href="https://fonts.googleapis.com/css2?family=Inter:wght@700&family=Noto+Sans+TC:wght@700&display=swap" rel="stylesheet"><style>
  html,body{margin:0;background:#0D0D0D;color:#F5F5F5;font-family:'Inter','Noto Sans TC',system-ui,sans-serif}
  .wrap{padding:26px 30px;display:flex;gap:18px;align-items:center;flex-wrap:wrap}
  .btn{padding:.8rem 2rem;border-radius:999px;font-size:.95rem;font-weight:700;display:inline-flex;align-items:center;gap:.5rem;text-decoration:none}
  .primary{background:linear-gradient(135deg,#FF4D6D,#8338EC);color:#fff;box-shadow:0 8px 30px rgba(255,77,109,.3)}
  .ghost{background:transparent;color:#F5F5F5;border:1.5px solid rgba(255,255,255,.2)}
  .lbl{font-family:ui-monospace,Menlo,monospace;font-size:10px;color:#888;width:100%}
</style></head><body>
<div class="wrap">
  <a class="btn primary">查看作品 →</a>
  <a class="btn ghost">聯絡我</a>
  <span class="lbl">btn-primary  ·  linear-gradient(c1→c4) + colored glow   ·   btn-ghost  ·  transparent + white-20 border   ·   hover lifts translateY(-3px)</span>
</div>
</body></html>
