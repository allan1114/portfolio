<!doctype html><html><head><meta charset="utf-8"><style>
  html,body{margin:0;background:#0D0D0D;color:#F5F5F5;font-family:'Inter',system-ui,sans-serif}
  .wrap{padding:28px 36px;display:flex;align-items:center;gap:40px;justify-content:center}
  .demo{display:flex;flex-direction:column;align-items:center;gap:14px}
  .btn{padding:14px 32px;border-radius:999px;font-weight:700;font-size:14px;background:linear-gradient(135deg,#FF4D6D,#8338EC);color:#fff;box-shadow:0 8px 30px rgba(255,77,109,.3)}
  .btn.lg{box-shadow:0 12px 40px rgba(255,77,109,.5)}
  .card{width:180px;height:90px;background:#161616;border:1px solid rgba(255,255,255,.06);border-radius:16px}
  .card.h{box-shadow:0 20px 60px rgba(0,0,0,.5);transform:translateY(-8px)}
  .lbl{font-family:ui-monospace,Menlo,monospace;font-size:10px;color:#888}
</style></head><body>
<div class="wrap">
  <div class="demo"><div class="btn">rest</div><span class="lbl">glow-primary  ·  0 8px 30px c1@30</span></div>
  <div class="demo"><div class="btn lg">hover</div><span class="lbl">glow-primary-lg  ·  0 12px 40px c1@50</span></div>
  <div class="demo"><div class="card h"></div><span class="lbl">shadow-card  ·  0 20px 60px #000@50</span></div>
</div>
</body></html>
