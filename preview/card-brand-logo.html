<!doctype html><html><head><meta charset="utf-8"><link href="https://fonts.googleapis.com/css2?family=Inter:wght@800&display=swap" rel="stylesheet"><style>
  html,body{margin:0;background:#0D0D0D;color:#F5F5F5;font-family:'Inter',system-ui,sans-serif}
  .wrap{padding:30px;display:flex;align-items:center;gap:40px;justify-content:center}
  .logo{font-size:5rem;font-weight:800;letter-spacing:-2px;background:linear-gradient(135deg,#FF4D6D,#FFBE0B);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
  .star{font-size:4rem;color:#FF4D6D}
  .spec{font-family:ui-monospace,Menlo,monospace;font-size:11px;color:#888;line-height:1.7}
  .spec b{color:#ccc;font-weight:600}
</style></head><body>
<div class="wrap">
  <div class="logo">YN.</div>
  <div class="star">✦</div>
  <div class="spec"><b>Logo</b> — text only, weight 800, grad-logo clip<br><b>Ambient mark</b> — ✦ U+2726 four-pointed star<br><b>No image files</b> — fully CSS-driven</div>
</div>
</body></html>
